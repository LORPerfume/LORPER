<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOR’ Shader Engine</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
color:#d4af37;
z-index:10;
letter-spacing:3px;
}

#info{
position:fixed;
bottom:50px;
left:8%;
max-width:420px;
color:#aaa;
line-height:1.6;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#d4af37;
font-size:28px;
z-index:999;
}
</style>

</head>

<body>

<div id="loading">COMPILING SHADERS...</div>

<div id="ui">
<div>LOR’ SHADER ENGINE</div>
<div>GLSL / WEBGL PIPELINE</div>
</div>

<div id="info">
<b style="color:#d4af37;">LOR’ CORE</b><br>
A procedural fragrance simulation rendered using shader-based lighting and volumetric depth.
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 2, 10);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// =====================
// GLSL SHADER MATERIAL (CORE)
// =====================

const uniforms = {
time: {value:0},
mouse: {value:new THREE.Vector2(0,0)}
};

const vertexShader = `
varying vec3 vPosition;

void main(){
vPosition = position;
gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}
`;

const fragmentShader = `
uniform float time;
uniform vec2 mouse;

varying vec3 vPosition;

// noise-ish function
float noise(vec3 p){
return sin(p.x*10.0 + time) * sin(p.y*10.0 + time) * sin(p.z*10.0);
}

void main(){

vec3 color = vec3(0.0);

// base gold tone
float n = noise(vPosition * 2.0);

color.r = 0.83 + n * 0.1;
color.g = 0.67 + n * 0.05;
color.b = 0.20;

// fresnel effect
float fresnel = pow(1.0 - abs(dot(vec3(0.0,0.0,1.0), normalize(vPosition))), 3.0);

color += fresnel * 0.6;

// mouse influence distortion
color += vec3(mouse.x * 0.2, mouse.y * 0.1, 0.0);

gl_FragColor = vec4(color,1.0);
}
`;

// =====================
// SHADER OBJECT (BOTTLE CORE)
// =====================
const geometry = new THREE.CylinderGeometry(1,1,2,64);

const material = new THREE.ShaderMaterial({
uniforms,
vertexShader,
fragmentShader
});

const bottle = new THREE.Mesh(geometry,material);
scene.add(bottle);

// =====================
// PARTICLE FIELD (SHADER-LIGHT FEEL)
// =====================
const particlesGeo = new THREE.BufferGeometry();
const count = 800;

const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3] = (Math.random()-0.5)*10;
pos[i*3+1] = (Math.random()-0.5)*10;
pos[i*3+2] = (Math.random()-0.5)*10;
}

particlesGeo.setAttribute("position", new THREE.BufferAttribute(pos,3));

const particles = new THREE.Points(
particlesGeo,
new THREE.PointsMaterial({
color:0xd4af37,
size:0.02
})
);

scene.add(particles);

// =====================
// ENGINE LOOP
// =====================
function animate(){

requestAnimationFrame(animate);

uniforms.time.value += 0.02;

bottle.rotation.y += 0.003;
particles.rotation.y += 0.001;

renderer.render(scene,camera);
}

animate();

// =====================
// MOUSE ENGINE
// =====================
document.addEventListener("mousemove",(e)=>{

uniforms.mouse.value.x = e.clientX / window.innerWidth;
uniforms.mouse.value.y = e.clientY / window.innerHeight;

camera.position.x = (uniforms.mouse.value.x - 0.5) * 2;
camera.position.y = -(uniforms.mouse.value.y - 0.5) * 2;
camera.lookAt(0,0,0);

});

// =====================
// RESIZE
// =====================
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

// loading
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

</script>

</body>
</html>

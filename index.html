<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOR’ | Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:'Playfair Display', serif;
overflow:hidden;
}

/* INTRO */
.intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
z-index:999;
animation:fadeOut 2.5s ease 2.5s forwards;
}

.intro h1{
font-size:90px;
color:#d4af37;
letter-spacing:20px;
animation:zoom 2s ease;
}

@keyframes zoom{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* HOME */
.home{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.home h2{
font-size:60px;
letter-spacing:10px;
}

.home span{color:#d4af37;}

.buttons{
margin-top:40px;
}

a{
text-decoration:none;
color:#000;
background:#d4af37;
padding:15px 30px;
margin:10px;
border-radius:40px;
display:inline-block;
font-weight:bold;
transition:.3s;
}

a:hover{transform:scale(1.1);}

</style>
</head>

<body>

<div class="intro">
<h1>LOR’</h1>
</div>

<div class="home">

<h2>
WELCOME TO<br>
<span>LOR’ UNIVERSE</span>
</h2>

<p>A fragrance is not worn. It is entered.</p>

<div class="buttons">
<a href="shop.html">ENTER SHOP</a>
<a href="lab.html">SCENT LAB</a>
<a href="story.html">OUR STORY</a>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOR’ WebGL Engine</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
color:#d4af37;
z-index:10;
letter-spacing:3px;
}

#info{
position:fixed;
bottom:60px;
left:8%;
max-width:400px;
color:#aaa;
line-height:1.6;
}

h1{
color:#d4af37;
margin:0;
}

#loading{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:#d4af37;
font-size:30px;
z-index:999;
}
</style>
</head>

<body>

<div id="loading">INITIALIZING LOR’ ENGINE...</div>

<div id="ui">
<div>LOR’ ENGINE</div>
<div>WEBGL / REALTIME</div>
</div>

<div id="info">
<h1>SOLID PERFUME</h1>
A real-time fragrance visualization system.<br>
Light reacts. Camera responds. Identity forms.
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// =====================
// SCENE SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 3, 12);

// camera
const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 6;

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// =====================
// LIGHTING SYSTEM
// =====================
const light = new THREE.PointLight(0xd4af37,2);
light.position.set(3,3,3);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.2);
scene.add(ambient);

// =====================
// PERFUME BOTTLE CORE
// =====================
const bottleGeo = new THREE.CylinderGeometry(0.8,0.8,2,64);

// fake glass material (engine approximation)
const bottleMat = new THREE.MeshStandardMaterial({
color:0x111111,
metalness:0.8,
roughness:0.2
});

const bottle = new THREE.Mesh(bottleGeo,bottleMat);
scene.add(bottle);

// gold cap
const capGeo = new THREE.SphereGeometry(0.5,32,32);
const capMat = new THREE.MeshStandardMaterial({
color:0xd4af37,
metalness:1,
roughness:0.1
});

const cap = new THREE.Mesh(capGeo,capMat);
cap.position.y = 1.2;
scene.add(cap);

// =====================
// SCENT PARTICLE FIELD
// =====================
const count = 400;
const positions = new Float32Array(count*3);

for(let i=0;i<count;i++){
positions[i*3] = (Math.random()-0.5)*10;
positions[i*3+1] = (Math.random()-0.5)*10;
positions[i*3+2] = (Math.random()-0.5)*10;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.BufferAttribute(positions,3));

const particles = new THREE.Points(
geo,
new THREE.PointsMaterial({
color:0xd4af37,
size:0.03
})
);

scene.add(particles);

// =====================
// ENGINE LOOP
// =====================
function animate(){

requestAnimationFrame(animate);

// core motion
bottle.rotation.y += 0.003;
cap.rotation.y += 0.005;

// scent field movement
particles.rotation.y += 0.001;

// light breathing effect
light.intensity = 1.5 + Math.sin(Date.now()*0.002)*0.5;

renderer.render(scene,camera);
}

animate();

// =====================
// MOUSE ENGINE (LIGHT TRACKING)
// =====================
document.addEventListener("mousemove",(e)=>{

const x = (e.clientX/window.innerWidth - 0.5)*2;
const y = (e.clientY/window.innerHeight - 0.5)*2;

camera.position.x = x*1.2;
camera.position.y = -y*1.2;
camera.lookAt(0,0,0);

// light follows cursor
light.position.x = x*5;
light.position.y = -y*5;

});

// =====================
// RESIZE ENGINE
// =====================
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

// fake loading
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

</script>

</body>
</html>

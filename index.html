<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOR’ | AI EXPERIENCE</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
color:#fff;
font-family:Arial;
}

/* ===== UI ===== */
#ui{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:25px 8%;
z-index:10;
}

.logo{
color:#d4af37;
letter-spacing:12px;
font-size:18px;
}

/* ===== HERO TEXT ===== */
.heroText{
position:fixed;
bottom:60px;
left:8%;
max-width:420px;
}

.heroText h1{
font-size:48px;
color:#d4af37;
}

.heroText p{
opacity:.7;
line-height:1.6;
}

/* ===== AI CHAT ===== */
.aiBox{
position:fixed;
right:40px;
bottom:40px;
width:280px;
height:320px;
background:rgba(20,20,20,0.6);
backdrop-filter:blur(15px);
border:1px solid #333;
border-radius:15px;
padding:15px;
display:flex;
flex-direction:column;
}

.aiHeader{
color:#d4af37;
margin-bottom:10px;
font-size:14px;
}

.messages{
flex:1;
overflow:auto;
font-size:12px;
opacity:.8;
line-height:1.4;
}

.input{
margin-top:10px;
display:flex;
gap:5px;
}

input{
flex:1;
padding:8px;
background:#111;
border:1px solid #333;
color:#fff;
}

button{
background:#d4af37;
border:none;
padding:8px;
cursor:pointer;
}

/* ===== LOADING ===== */
#loading{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#d4af37;
z-index:999;
}

</style>

</head>

<body>

<div id="loading">INITIALIZING LOR’ AI...</div>

<div id="ui">
<div class="logo">LOR’ AI EXPERIENCE</div>
<div>GLOBAL LUXURY SYSTEM</div>
</div>

<div class="heroText">
<h1>SOLID PERFUME</h1>
<p>
Not a product.<br>
A digital identity system generated in real-time.
</p>
</div>

<!-- AI BOX -->
<div class="aiBox">
<div class="aiHeader">LOR’ AI ASSISTANT</div>

<div class="messages" id="chat">
> Welcome to LOR’ experience<br>
> Ask about scent, identity, or luxury system...
</div>

<div class="input">
<input id="msg" placeholder="Ask LOR’ AI...">
<button onclick="send()">→</button>
</div>

</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();

// fog (luxury depth)
scene.fog = new THREE.Fog(0x000000, 2, 10);

// camera
const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

// renderer
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("c"),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

// lights
const light = new THREE.PointLight(0xd4af37,2);
light.position.set(2,3,3);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.2);
scene.add(ambient);

// ===== 3D BOTTLE =====
const body = new THREE.Mesh(
new THREE.CylinderGeometry(0.8,0.8,2,32),
new THREE.MeshStandardMaterial({color:0x111111,metalness:0.7,roughness:0.2})
);

scene.add(body);

// gold ring
const ring = new THREE.Mesh(
new THREE.TorusGeometry(0.9,0.05,16,100),
new THREE.MeshStandardMaterial({color:0xd4af37})
);

ring.position.y = 0.5;
scene.add(ring);

// floating particles
const particlesGeo = new THREE.BufferGeometry();
const count = 200;

const pos = new Float32Array(count * 3);

for(let i=0;i<count;i++){
pos[i*3] = (Math.random()-0.5)*10;
pos[i*3+1] = (Math.random()-0.5)*10;
pos[i*3+2] = (Math.random()-0.5)*10;
}

particlesGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));

const particles = new THREE.Points(
particlesGeo,
new THREE.PointsMaterial({color:0xd4af37,size:0.02})
);

scene.add(particles);

// ===== ANIMATION =====
function animate(){

requestAnimationFrame(animate);

body.rotation.y += 0.004;
ring.rotation.y += 0.01;

particles.rotation.y += 0.001;

renderer.render(scene,camera);
}

animate();

// ===== MOUSE MOVE =====
document.addEventListener("mousemove",(e)=>{
let x = (e.clientX/window.innerWidth - 0.5)*2;
let y = (e.clientY/window.innerHeight - 0.5)*2;

camera.position.x = x;
camera.position.y = -y;
camera.lookAt(0,0,0);
});

// ===== AI FAKE LOGIC =====
function send(){

let input = document.getElementById("msg");
let chat = document.getElementById("chat");

let text = input.value;

chat.innerHTML += "<br>> "+text;

let response = "";

if(text.includes("scent")){
response = "LOR’ scent engineered for long-term identity retention.";
}
else if(text.includes("price")){
response = "23 JD — luxury identity system unit.";
}
else{
response = "LOR’ AI: identity-based fragrance system active.";
}

setTimeout(()=>{
chat.innerHTML += "<br>> "+response;
chat.scrollTop = chat.scrollHeight;
},600);

input.value="";
}

// loading
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2000);

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>

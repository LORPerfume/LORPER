<h1>THE STORY OF LOR’</h1>

<p>
LOR’ was not created to compete in a market.<br><br>

It was created to redefine identity.<br><br>

In a world full of sprays, we built something that stays.<br><br>

Not on clothes.<br>
Not in air.<br>
But on you.<br><br>

You do not wear LOR’.<br>
You become it.
